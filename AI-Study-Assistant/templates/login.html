<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - AI Study Assistant</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <div class="page">
      <div class="card auth-card">
        <i class="ph-fill ph-brain" style="font-size: 48px; color: var(--primary); margin-bottom: 16px;"></i>
        <h1>Welcome Back</h1>
        <p class="muted">Turn PDFs and notes into a summary, flashcards, and quizzes.</p>

        {% if error %}
        <div class="alert"><i class="ph-fill ph-warning-circle"></i> {{ error }}</div>
        {% endif %}

        <form method="POST" action="/login" class="form">
          <label>
            <span>Email Address</span>
            <input type="email" name="email" placeholder="you@university.edu" required />
          </label>
          <label>
            <span>Password</span>
            <input type="password" name="password" placeholder="••••••••" required />
          </label>
          <button class="btn primary" type="submit" style="margin-top: 8px;">Log In <i class="ph-bold ph-arrow-right"></i></button>
        </form>

        <div class="footer-links" style="justify-content: center;">
          <span class="muted">New user?</span>
          <a href="/register" style="font-weight: 600;">Create an account</a>
        </div>
      </div>
    </div>
    <script>
      (function () {
        try { document.documentElement.dataset.theme = localStorage.getItem("ai_study_theme") || "violet"; } catch (e) {}
      })();
    </script>
  </body>
</html>
